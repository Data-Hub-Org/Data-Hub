name: 批量加TOKEN
on: workflow_dispatch

jobs:
  batch-set:
    runs-on: ubuntu-latest
    steps:
      - name: 批量配置密钥
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}  # 组织管理员PAT（和上面同一个即可）
          script: |
            const ORG = "Data-Hub-Org";  // 你的组织名，改这里
            const PERSONAL_TOKEN = "${{ secrets.PERSONAL_TOKEN }}";  // 你上面生成的通用PAT

            // 获取组织下所有私有仓库
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: ORG,
              type: "private",
              per_page: 100
            });

            for (const repo of repos) {
              console.log(`处理仓库：${repo.name}`);
              // 获取仓库公钥（加密Token用，GitHub要求）
              const { data: { key, key_id } } = await github.rest.actions.getRepoPublicKey({
                owner: ORG,
                repo: repo.name
              });
              // 加密Token
              const sodium = require('tweetsodium');
              const encrypted = sodium.seal(Buffer.from(PERSONAL_TOKEN), Buffer.from(key, 'base64'));
              // 给当前仓库添加/更新PERSONAL_TOKEN
              await github.rest.actions.createOrUpdateRepoSecret({
                owner: ORG,
                repo: repo.name,
                secret_name: "PERSONAL_TOKEN",
                encrypted_value: Buffer.from(encrypted).toString('base64'),
                key_id: key_id
              });
              console.log(`✅ ${repo.name} 密钥配置完成`);
            }
            console.log("\n🎉 所有组织私有仓库密钥配置完毕！");