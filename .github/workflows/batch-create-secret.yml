name: 批量给私有仓库创建PERSONAL_TOKEN
on:
  workflow_dispatch:

jobs:
  batch-create:
    runs-on: ubuntu-latest
    steps:
      - name: 批量创建仓库级Secret
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const ORG = "Data-Hub-Org";
            const TOKEN = "${{ secrets.PERSONAL_TOKEN }}";

            // 1. 获取所有私有仓库
            const repos = await github.paginate(`GET /orgs/${ORG}/repos`, {
              type: "private",
              per_page: 100
            });

            console.log(`✅ 找到${repos.length}个私有仓库`);

            for (const repo of repos) {
              const repoName = repo.name;
              console.log(`🔄 正在给${repoName}创建PERSONAL_TOKEN`);

              try {
                // 2. 获取仓库公钥
                const { data: { key, key_id } } = await github.rest.actions.getRepoPublicKey({
                  owner: ORG,
                  repo: repoName
                });

                // 3. 加密Token
                const sodium = require("tweetsodium");
                const encrypted = sodium.seal(Buffer.from(TOKEN), Buffer.from(key, "base64"));

                // 4. 创建仓库级Secret（免费版私有仓库支持仓库级Secret！）
                await github.rest.actions.createOrUpdateRepoSecret({
                  owner: ORG,
                  repo: repoName,
                  secret_name: "PERSONAL_TOKEN",
                  encrypted_value: Buffer.from(encrypted).toString("base64"),
                  key_id: key_id
                });

                console.log(`✅ ${repoName}创建成功`);
              } catch (err) {
                console.log(`❌ ${repoName}失败: ${err.message}`);
              }
            }

            console.log("🎉 所有私有仓库PERSONAL_TOKEN创建完成！");