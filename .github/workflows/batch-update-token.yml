name: 批量更新所有私有仓库的PERSONAL_TOKEN
on:
  workflow_dispatch:

jobs:
  batch-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: 批量更新所有私有仓库Token
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            // 1. 写死组织名，绝对不动态获取
            const ORG_NAME = "Data-Hub-Org";
            // 2. 写死个人Token（从组织级Secret读取，加引号避免语法错误）
            const PERSONAL_TOKEN = "${{ secrets.PERSONAL_TOKEN }}";

            // 3. 获取组织下所有私有仓库
            const repos = await github.paginate(
              `GET /orgs/${ORG_NAME}/repos`,
              {
                type: "private",
                per_page: 100
              }
            );

            console.log(`✅ 找到 ${repos.length} 个私有仓库`);

            // 4. 逐个更新每个仓库的PERSONAL_TOKEN
            for (const repo of repos) {
              const REPO_NAME = repo.name;
              console.log(`🔄 正在更新: ${REPO_NAME}`);

              try {
                // 5. 获取仓库公钥（用于加密Secret，GitHub官方要求）
                const { data: { key, key_id } } = await github.rest.actions.getRepoPublicKey({
                  owner: ORG_NAME,
                  repo: REPO_NAME
                });

                // 6. 官方标准加密方式（用tweetsodium，actions环境自带）
                const sodium = require("tweetsodium");
                const messageBytes = Buffer.from(PERSONAL_TOKEN);
                const keyBytes = Buffer.from(key, "base64");
                const encryptedBytes = sodium.seal(messageBytes, keyBytes);
                const encryptedValue = Buffer.from(encryptedBytes).toString("base64");

                // 7. 创建/更新仓库级Secret
                await github.rest.actions.createOrUpdateRepoSecret({
                  owner: ORG_NAME,
                  repo: REPO_NAME,
                  secret_name: "PERSONAL_TOKEN",
                  encrypted_value: encryptedValue,
                  key_id: key_id
                });

                console.log(`✅ ${REPO_NAME} 更新成功`);
              } catch (error) {
                console.log(`❌ ${REPO_NAME} 更新失败: ${error.message}`);
              }
            }

            console.log("🎉 所有私有仓库的PERSONAL_TOKEN批量更新完成！");