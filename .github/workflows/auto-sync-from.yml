name: 生成加密Token文件（仅Token过期时运行一次）

on:
  workflow_dispatch:  # 手动触发，Token过期时跑一次

jobs:
  generate-token:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送文件到中转仓

    steps:
      - name: 拉取中转仓代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # 核心：用GitHub自带的加密工具，加密Token
      - name: 加密PERSONAL_TOKEN并生成文件
        run: |
          # 读取组织级Secret里的Token
          TOKEN="${{ secrets.PERSONAL_TOKEN }}"
          
          # 用GitHub Actions自带的加密命令加密
          echo "$TOKEN" | openssl enc -aes-256-cbc -salt -pbkdf2 -k "${{ secrets.GITHUB_TOKEN }}" -out token.enc
          
          echo "✅ Token加密完成，生成token.enc文件"

      # 把加密后的Token文件推送到中转仓
      - name: 推送加密Token文件
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add token.enc
          git commit -m "更新加密Token文件"
          git push origin main
          echo "✅ 加密Token文件已推送到中转仓"